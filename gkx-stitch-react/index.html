<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GKX 智能决策平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1392ec",
              "secondary": "#0d9488",
              "primary-blue": "#00A3D9",
              "background-light": "#f6f7f8",
              "background-main": "#F5F7FA",
              "sidebar-active-bg": "#E6F7FF",
              "nav-text": "#333333",
              "border-light": "#E5E8ED",
            },
            fontFamily: {
              "display": ["Public Sans", "PingFang SC", "Microsoft YaHei", "sans-serif"],
              "body": ["Inter", "PingFang SC", "Microsoft YaHei", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "12px",
              "xl": "16px",
              "2xl": "1.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
    <style>
      body { font-family: 'Inter', 'Public Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
      .active-nav-item {
        background-color: #E6F7FF;
        color: #00A3D9;
        border-left: 3px solid #00A3D9;
      }
      .custom-shadow { box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05); }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        font-feature-settings: 'liga';
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
