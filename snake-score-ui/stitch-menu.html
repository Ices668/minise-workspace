<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snake Game Modern Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .neon-glow {
            text-shadow: 0 0 10px rgba(19, 236, 128, 0.5), 0 0 20px rgba(19, 236, 128, 0.3);
        }
        .bg-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(19, 236, 128, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center overflow-hidden bg-grid">
<!-- Main Container -->
<div class="relative flex h-full w-full max-w-4xl flex-col items-center justify-center px-6 py-12">
<!-- Header / Logo Section -->
<header class="mb-16 text-center">
<div class="flex items-center justify-center mb-4">
<div class="size-16 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-6xl">videogame_asset</span>
</div>
</div>
<h1 class="text-primary font-display text-8xl md:text-9xl font-bold tracking-tighter neon-glow">
                SNAKE
            </h1>
<p class="text-primary/60 font-medium tracking-[0.5em] mt-2 uppercase text-sm">Modern Edition</p>
</header>
<!-- Menu Actions -->
<div class="flex flex-col w-full max-w-sm gap-4 mb-20">
<button class="group relative flex h-16 w-full items-center justify-center overflow-hidden rounded-full bg-primary text-background-dark text-xl font-bold tracking-widest transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(19,236,128,0.4)]">
<span class="material-symbols-outlined mr-2">play_arrow</span>
                START GAME
            </button>
<button class="flex h-16 w-full items-center justify-center rounded-full border-2 border-primary/40 bg-transparent text-primary text-lg font-bold tracking-widest transition-all hover:border-primary hover:bg-primary/10 active:scale-95">
<span class="material-symbols-outlined mr-2">settings</span>
                SETTINGS
            </button>
<button class="flex h-16 w-full items-center justify-center rounded-full border-2 border-primary/40 bg-transparent text-primary text-lg font-bold tracking-widest transition-all hover:border-primary hover:bg-primary/10 active:scale-95">
<span class="material-symbols-outlined mr-2">leaderboard</span>
                LEADERBOARD
            </button>
</div>
<!-- Stats Section -->
<div class="flex items-center gap-12 border-t border-primary/20 pt-8 w-full max-w-md justify-center">
<div class="flex flex-col items-center gap-1">
<p class="text-primary/50 text-xs font-bold tracking-widest uppercase">High Score</p>
<p class="text-slate-100 text-2xl font-bold font-display tracking-tight">12,450</p>
</div>
<div class="h-10 w-px bg-primary/30"></div>
<div class="flex flex-col items-center gap-1">
<p class="text-primary/50 text-xs font-bold tracking-widest uppercase">Best Level</p>
<p class="text-slate-100 text-2xl font-bold font-display tracking-tight">Level 15</p>
</div>
</div>
<!-- Footer Decor -->
<footer class="absolute bottom-8 flex w-full items-center justify-between px-10 text-primary/30 text-xs tracking-widest font-medium uppercase">
<span>v2.0.4-stable</span>
<div class="flex gap-6">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Credits</a>
</div>
<span>© 2024</span>
</footer>
</div>
<!-- Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20 overflow-hidden">
<div class="absolute top-10 left-10 w-64 h-64 bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-10 right-10 w-96 h-96 bg-primary/10 rounded-full blur-[150px]"></div>
</div>
</body></html>
