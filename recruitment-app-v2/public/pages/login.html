<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>招才 - 登录与注册</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col bg-white dark:bg-background-dark overflow-x-hidden max-w-[430px] mx-auto shadow-2xl">
<!-- TopAppBar Navigation -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-3xl">work</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">招才</h2>
</div>
<!-- Welcome Header -->
<div class="px-6 pt-10 pb-6">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[28px] font-bold leading-tight">欢迎登录，</h1>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[28px] font-bold leading-tight">找到理想工作</h1>
</div>
<!-- Tab Navigation -->
<div class="px-6 mb-8">
<div class="flex border-b border-slate-200 dark:border-slate-800 justify-between">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-primary pb-3 pt-2 flex-1" href="#">
<p class="text-sm font-bold leading-normal tracking-wide">手机号登录</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-2 flex-1" href="#">
<p class="text-sm font-medium leading-normal tracking-wide">密码登录</p>
</a>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5 px-6">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">手机号</p>
<div class="relative flex items-center">
<span class="absolute left-4 text-slate-400 material-symbols-outlined">smartphone</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal" placeholder="请输入手机号" type="tel" value=""/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">验证码</p>
<div class="flex w-full gap-3">
<div class="relative flex-1">
<span class="absolute left-4 top-4 text-slate-400 material-symbols-outlined">verified_user</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal" placeholder="请输入验证码" type="text"/>
</div>
<button class="px-4 h-14 text-primary font-semibold text-sm whitespace-nowrap bg-primary/10 rounded-xl hover:bg-primary/20 transition-colors">
                        获取验证码
                    </button>
</div>
</label>
</div>
<!-- Login Button -->
<div class="px-6 pt-10">
<button class="w-full h-14 bg-primary text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/30 hover:bg-blue-700 active:scale-[0.98] transition-all">
                登录
            </button>
</div>
<!-- Divider -->
<div class="mt-auto mb-8">
<div class="flex items-center px-10 gap-4 mb-8">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
<p class="text-slate-400 text-xs font-medium">其他登录方式</p>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
</div>
<!-- Social Icons -->
<div class="flex justify-center gap-10">
<button class="flex flex-col items-center gap-2 group">
<div class="size-12 rounded-full border border-slate-200 dark:border-slate-800 flex items-center justify-center group-hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-green-500 text-2xl">chat</span>
</div>
<span class="text-xs text-slate-500">微信</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="size-12 rounded-full border border-slate-200 dark:border-slate-800 flex items-center justify-center group-hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-blue-400 text-2xl">alternate_email</span>
</div>
<span class="text-xs text-slate-500">QQ</span>
</button>
</div>
</div>
<!-- Footer Register -->
<div class="pb-10 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                没有账号？ <a class="text-primary font-bold hover:underline" href="#">立即注册</a>
</p>
</div>
</div>

<script>
(function() {
  document.addEventListener('click', function(e) {
    var el = e.target.closest('button');
    if (!el) return;
    var text = el.innerText || '';
    if (text.includes('登录') || text.includes('验证码登录')) {
      window.parent.postMessage({ type: 'navigate', path: '/home' }, '*');
    }
  });
})();
</script>
</body></html>
