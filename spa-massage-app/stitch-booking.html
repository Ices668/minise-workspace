<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c9a74a",
                        "background-light": "#f8f7f6",
                        "background-dark": "#1f1c13",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Service Booking - Luxury Spa</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-50">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Book Appointment</h2>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</div>
<!-- Selected Therapist Card -->
<div class="p-4">
<div class="flex items-center justify-between gap-4 rounded-xl bg-white dark:bg-zinc-900 p-4 shadow-sm border border-primary/10">
<div class="flex items-center gap-4">
<div class="size-16 rounded-full overflow-hidden bg-primary/20 flex-shrink-0 border-2 border-primary/20">
<img class="w-full h-full object-cover" data-alt="Close up portrait of a professional spa therapist" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWx4m4zlPLh2Tm2tVuM3OizGpCXyDBy5GiePQbZ7S6qEOFfQwifj-zSH3t1GP59UZtBHf9eahum5EE7MWJ5EgRRm8D9a8x12ZmG0ayVqPheBJBG9kPu5Ag5K6ANKrzfPYYJruJcU052vsaDtUwzscIiFPhCX98Z5tmGIt_mdq-O4WAaOzBPzAN-VmUUgudOFrty4H8LuvHIuD3ozkqbOi6PDjOWHhoTcUJ0Op12U5f5KwiNUdN9mNp5nA-HMtLqcRjLbWxJWRM7mw"/>
</div>
<div class="flex flex-col">
<p class="text-primary text-xs font-semibold uppercase tracking-wider">Your Specialist</p>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight">Elena Rodriguez</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Lead Massage Therapist</p>
</div>
</div>
<button class="flex items-center justify-center rounded-full h-9 px-4 bg-primary/10 text-primary text-xs font-bold hover:bg-primary/20 transition-colors uppercase tracking-tight">
                    Change
                </button>
</div>
</div>
<!-- Service Configuration -->
<div class="px-4 py-2 space-y-4">
<div class="grid grid-cols-2 gap-3">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">Massage Type</label>
<div class="relative group">
<select class="w-full bg-white dark:bg-zinc-900 border border-primary/20 rounded-lg py-2.5 px-3 text-sm appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
<option>Swedish Massage</option>
<option>Deep Tissue</option>
<option>Hot Stone</option>
<option>Aromatherapy</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-2.5 text-primary pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">Duration</label>
<div class="relative group">
<select class="w-full bg-white dark:bg-zinc-900 border border-primary/20 rounded-lg py-2.5 px-3 text-sm appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
<option>60 Minutes</option>
<option>90 Minutes</option>
<option>120 Minutes</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-2.5 text-primary pointer-events-none">timer</span>
</div>
</div>
</div>
</div>
<!-- Date Selection -->
<div class="pt-6 pb-2">
<div class="flex items-center justify-between px-4 mb-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Select Date</h3>
<div class="flex gap-2">
<button class="p-1 rounded-full bg-primary/5 hover:bg-primary/10 text-primary">
<span class="material-symbols-outlined text-lg leading-none">chevron_left</span>
</button>
<button class="p-1 rounded-full bg-primary/5 hover:bg-primary/10 text-primary">
<span class="material-symbols-outlined text-lg leading-none">chevron_right</span>
</button>
</div>
</div>
<div class="px-4">
<div class="bg-white dark:bg-zinc-900 rounded-xl p-4 border border-primary/10">
<p class="text-center font-bold text-sm mb-4 text-slate-600 dark:text-slate-300">October 2023</p>
<div class="grid grid-cols-7 gap-y-1">
<p class="text-slate-400 text-xs font-bold text-center pb-2">S</p>
<p class="text-slate-400 text-xs font-bold text-center pb-2">M</p>
<p class="text-slate-400 text-xs font-bold text-center pb-2">T</p>
<p class="text-slate-400 text-xs font-bold text-center pb-2">W</p>
<p class="text-slate-400 text-xs font-bold text-center pb-2">T</p>
<p class="text-slate-400 text-xs font-bold text-center pb-2">F</p>
<p class="text-slate-400 text-xs font-bold text-center pb-2">S</p>
<!-- Calendar Days -->
<div class="col-start-4 flex justify-center py-2"><span class="text-sm font-medium">1</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">2</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">3</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">4</span></div>
<div class="flex justify-center py-2">
<span class="size-9 flex items-center justify-center rounded-full bg-primary text-white text-sm font-bold shadow-md shadow-primary/30">5</span>
</div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">6</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">7</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">8</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">9</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">10</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">11</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium text-primary">12</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">13</span></div>
<div class="flex justify-center py-2"><span class="text-sm font-medium">14</span></div>
</div>
</div>
</div>
</div>
<!-- Time Selection -->
<div class="pt-6 pb-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold px-4 mb-4">Select Time</h3>
<div class="flex gap-3 overflow-x-auto px-4 no-scrollbar pb-2">
<button class="flex-none px-6 py-2.5 rounded-lg border border-primary/30 text-primary text-sm font-bold hover:bg-primary/5 transition-colors">09:00 AM</button>
<button class="flex-none px-6 py-2.5 rounded-lg bg-primary text-white text-sm font-bold shadow-md shadow-primary/30">10:30 AM</button>
<button class="flex-none px-6 py-2.5 rounded-lg border border-primary/30 text-primary text-sm font-bold hover:bg-primary/5 transition-colors">12:00 PM</button>
<button class="flex-none px-6 py-2.5 rounded-lg border border-primary/30 text-primary text-sm font-bold hover:bg-primary/5 transition-colors">01:30 PM</button>
<button class="flex-none px-6 py-2.5 rounded-lg border border-primary/30 text-primary text-sm font-bold hover:bg-primary/5 transition-colors">03:00 PM</button>
<button class="flex-none px-6 py-2.5 rounded-lg border border-primary/30 text-primary text-sm font-bold hover:bg-primary/5 transition-colors">04:30 PM</button>
</div>
</div>
<!-- Special Requests -->
<div class="p-4 pt-6">
<label class="text-slate-900 dark:text-slate-100 text-lg font-bold block mb-2">Special Requests</label>
<textarea class="w-full h-24 rounded-xl border border-primary/20 bg-white dark:bg-zinc-900 p-4 text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-slate-400" placeholder="Any preferences or medical conditions we should know about? (e.g., allergies, pressure level)"></textarea>
</div>
<!-- Bottom Action -->
<div class="mt-auto p-4 pb-8 space-y-4">
<div class="flex items-center justify-between px-2">
<div class="flex flex-col">
<span class="text-xs text-slate-500 font-bold uppercase tracking-wider">Estimated Total</span>
<span class="text-2xl font-extrabold text-slate-900 dark:text-slate-100">$185.00</span>
</div>
<div class="flex items-center text-primary gap-1">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Safe Payment</span>
</div>
</div>
<button class="w-full bg-primary py-4 rounded-xl text-white font-bold text-lg shadow-lg shadow-primary/25 hover:bg-primary/90 active:scale-[0.98] transition-all">
                Confirm Booking
            </button>
</div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
